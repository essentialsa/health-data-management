services:
  - type: web
    name: essentialsa-health-data-ocr
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./report-parser/Dockerfile
    dockerContext: ./report-parser
    healthCheckPath: /api/healthz
    envVars:
      - key: USE_MOCK
        value: "false"
      - key: OCR_ENGINE
        value: tesseract
      - key: TESSERACT_LANG
        value: chi_sim+eng
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
