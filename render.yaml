services:
  - type: web
    name: essentialsa-health-data-ocr
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./report-parser/Dockerfile
    dockerContext: ./report-parser
    healthCheckPath: /api/healthz
    buildFilter:
      paths:
        - report-parser/**
        - render.yaml
    envVars:
      - key: USE_MOCK
        value: "false"
      - key: OCR_LLM_ENABLED
        value: "true"
      - key: OCR_LLM_BASE_URL
        value: "PLEASE_SET_IN_RENDER"
      - key: OCR_LLM_API_KEY
        value: "PLEASE_SET_IN_RENDER"
      - key: OCR_LLM_MODEL
        value: gpt-4o-mini
      - key: OCR_LLM_TIMEOUT_SEC
        value: "45"
      - key: OCR_LLM_MAX_OUTPUT_TOKENS
        value: "1600"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
