services:
  - type: web
    name: essentialsa-health-data-ocr
    runtime: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: ./report-parser/Dockerfile
    dockerContext: ./report-parser
    healthCheckPath: /api/healthz
    buildFilter:
      paths:
        - report-parser/**
        - render.yaml
    envVars:
      - key: USE_MOCK
        value: "false"
      - key: OCR_ENGINE
        value: paddle
      - key: OCR_MAX_IMAGE_SIDE
        value: "2200"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: CORS_ALLOW_CREDENTIALS
        value: "false"
